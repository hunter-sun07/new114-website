<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You for Participating</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --green: #00ff41;
    --dark-green: #003b00;
    --dim-green: #00aa2b;
    --bg: #000000;
    --panel: #050f05;
    --amber: #ffb000;
    --red: #ff2200;
    --grid: rgba(0, 255, 65, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 50;
  }

  /* Corner brackets */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 60;
    opacity: 0.6;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--green);
  }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner.tl { top: 16px; left: 16px; }
  .corner.tl::before { top:0; left:0; }
  .corner.tl::after  { top:0; left:0; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.tr::before { top:0; left:0; }
  .corner.tr::after  { top:0; left:0; }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner.bl::before { top:0; left:0; }
  .corner.bl::after  { top:0; left:0; }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }
  .corner.br::before { top:0; left:0; }
  .corner.br::after  { top:0; left:0; }

  /* HUD top bar */
  .hud-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 90px;
    font-size: 11px;
    color: var(--dim-green);
    letter-spacing: 0.15em;
    border-bottom: 1px solid rgba(0,255,65,0.1);
    z-index: 70;
    background: rgba(0,0,0,0.5);
  }

  .hud-bar .blink {
    color: var(--red);
    animation: blink 1.2s step-end infinite;
  }

  /* HUD bottom bar */
  .hud-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 90px;
    font-size: 11px;
    color: var(--dim-green);
    letter-spacing: 0.12em;
    border-top: 1px solid rgba(0,255,65,0.1);
    z-index: 70;
    background: rgba(0,0,0,0.5);
  }

  /* Camera icon SVG in corner */
  .cam-icon {
    position: fixed;
    top: 20px; right: 90px;
    z-index: 80;
    opacity: 0.5;
    animation: cam-pulse 3s ease-in-out infinite;
  }

  @keyframes cam-pulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  /* Main layout */
  .wrapper {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    gap: 0;
  }

  /* Eye / lens graphic */
  .lens-ring {
    position: relative;
    width: 120px; height: 120px;
    margin-bottom: 36px;
    animation: spin-slow 18s linear infinite;
  }

  .lens-ring svg { width: 100%; height: 100%; }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .eye-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin-slow 18s linear infinite reverse;
  }

  .eye-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #00ff41, #003300);
    box-shadow: 0 0 18px 6px rgba(0,255,65,0.6), 0 0 40px 10px rgba(0,255,65,0.2);
    animation: eye-glow 2.5s ease-in-out infinite;
  }

  @keyframes eye-glow {
    0%,100% { box-shadow: 0 0 18px 6px rgba(0,255,65,0.6), 0 0 40px 10px rgba(0,255,65,0.2); }
    50%      { box-shadow: 0 0 28px 10px rgba(0,255,65,0.9), 0 0 60px 20px rgba(0,255,65,0.35); }
  }

  /* Main heading */
  .main-heading {
    font-family: 'Times New Roman', Times, serif;
    font-size: 30px;
    font-weight: normal;
    letter-spacing: 0.06em;
    text-align: center;
    color: var(--green);
    text-shadow: 0 0 12px rgba(0,255,65,0.7), 0 0 30px rgba(0,255,65,0.3);
    margin-bottom: 48px;
    animation: flicker 8s infinite;
    position: relative;
  }

  .main-heading::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin-top: 16px;
    opacity: 0.5;
  }

  @keyframes flicker {
    0%,96%,100% { opacity: 1; }
    97% { opacity: 0.7; }
    98% { opacity: 1; }
    99% { opacity: 0.5; }
  }

  /* Question card */
  .question-card {
    position: relative;
    border: 1px solid rgba(0,255,65,0.3);
    background: rgba(0,20,0,0.6);
    padding: 36px 48px;
    max-width: 680px;
    width: 100%;
    text-align: center;
    margin-bottom: 32px;
    box-shadow:
      0 0 0 1px rgba(0,255,65,0.05),
      inset 0 0 40px rgba(0,255,65,0.04),
      0 0 30px rgba(0,255,65,0.08);
  }

  /* Card corner decorations */
  .question-card::before,
  .question-card::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--green);
    border-style: solid;
    opacity: 0.7;
  }
  .question-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .question-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim-green);
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  .question-text {
    font-family: 'Times New Roman', Times, serif;
    font-size: 24px;
    font-weight: normal;
    line-height: 1.5;
    color: var(--amber);
    text-shadow: 0 0 10px rgba(255,176,0,0.5);
    min-height: 3em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Typewriter cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 1.1em;
    background: var(--amber);
    margin-left: 3px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Instruction text */
  .instruction {
    font-family: 'Times New Roman', Times, serif;
    font-size: 24px;
    font-weight: normal;
    color: var(--dim-green);
    text-align: center;
    max-width: 620px;
    line-height: 1.6;
    text-shadow: 0 0 8px rgba(0,170,43,0.4);
    padding: 0 16px;
    border-left: 2px solid rgba(0,255,65,0.2);
    border-right: 2px solid rgba(0,255,65,0.2);
  }

  /* New question button */
  .btn-new {
    margin-top: 36px;
    background: none;
    border: 1px solid var(--dim-green);
    color: var(--dim-green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 10px 28px;
    cursor: crosshair;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-new:hover {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 12px rgba(0,255,65,0.3);
  }

  .btn-new:hover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,255,65,0.05);
  }

  /* Noise/static overlay */
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.025;
    z-index: 45;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    animation: noise-anim 0.2s steps(1) infinite;
  }

  @keyframes noise-anim {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-2px, 1px); }
    50%  { transform: translate(1px, -2px); }
    75%  { transform: translate(-1px, 2px); }
    100% { transform: translate(2px, -1px); }
  }

  /* ID number counter */
  #subject-id {
    color: var(--amber);
    font-size: 11px;
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="noise"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- HUD bars -->
<div class="hud-bar">
  <span>SYS:ACTIVE &nbsp;|&nbsp; CAM_NET:ONLINE &nbsp;|&nbsp; NODE_07</span>
  <span><span class="blink">● REC</span></span>
  <span id="clock">--:--:--</span>
</div>

<div class="hud-bottom">
  <span>SUBJ: <span id="subject-id">GEN...</span></span>
  <span>PROTOCOL 4 &nbsp;|&nbsp; OBSERVATION UNIT</span>
  <span>FRAME: <span id="frame-count">000000</span></span>
</div>

<!-- Main content -->
<div class="wrapper">

  <!-- Rotating lens -->
  <div class="lens-ring">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="56" stroke="#00ff41" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
      <circle cx="60" cy="60" r="46" stroke="#00aa2b" stroke-width="0.5" opacity="0.4"/>
      <!-- Tick marks -->
      <line x1="60" y1="4"  x2="60" y2="14"  stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>
      <line x1="60" y1="106" x2="60" y2="116" stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>
      <line x1="4"  y1="60" x2="14"  y2="60" stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>
      <line x1="106" y1="60" x2="116" y2="60" stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>
      <!-- Diagonal ticks -->
      <line x1="20" y1="20" x2="27" y2="27" stroke="#00aa2b" stroke-width="1" opacity="0.5"/>
      <line x1="100" y1="20" x2="93" y2="27" stroke="#00aa2b" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="100" x2="27" y2="93" stroke="#00aa2b" stroke-width="1" opacity="0.5"/>
      <line x1="100" y1="100" x2="93" y2="93" stroke="#00aa2b" stroke-width="1" opacity="0.5"/>
    </svg>
    <div class="eye-center">
      <div class="eye-dot"></div>
    </div>
  </div>

  <h1 class="main-heading">Thank you for Participating.</h1>

  <div class="question-card">
    <div class="label">▸ QUERY // SURVEILLANCE LOG ENTRY</div>
    <div class="question-text" id="question-display">
      <span id="question-inner"></span><span class="cursor"></span>
    </div>
  </div>

  <p class="instruction">
    Write it directly on the mirror.
  </p>

  <button class="btn-new" onclick="nextQuestion()">[ NEXT QUERY ]</button>

</div>

<script>
  const questions = [
    "What is the last public store you went to?",
    "What route did you take to get home yesterday?",
    "Who did you make eye contact with on your commute today?",
    "What were you wearing the last time you left your home?",
    "Name the last stranger who held a door open for you.",
    "What was the last cash transaction you made?",
    "Which window in your home do you look out of most often?",
    "What time did you last leave the house after dark?",
    "How many cameras did you pass today without noticing?",
    "What is the name of the last person who knew where you were going?",
    "Describe the last parking lot you stood in.",
    "What did you search for online in the last 24 hours?",
    "When did you last turn off your phone completely?",
    "What is the last address you typed into a map app?",
    "Who was the last person to photograph you without asking?",
    "Describe what you can see through your front window right now.",
    "What is the last event you attended where your name was recorded?",
    "How many people know your daily routine?",
    "What was the last piece of mail you received with your address on it?",
    "Name the last place you visited where you had to show ID."
  ];

  let currentIndex = -1;
  let typeTimer = null;

  function typeWriter(element, text, speed, callback) {
    element.textContent = '';
    let i = 0;
    if (typeTimer) clearInterval(typeTimer);
    typeTimer = setInterval(() => {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
      } else {
        clearInterval(typeTimer);
        if (callback) callback();
      }
    }, speed);
  }

  function nextQuestion() {
    let next;
    do { next = Math.floor(Math.random() * questions.length); }
    while (next === currentIndex && questions.length > 1);
    currentIndex = next;
    const el = document.getElementById('question-inner');
    typeWriter(el, questions[currentIndex], 38);
  }

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Frame counter
  let frame = 0;
  setInterval(() => {
    frame += Math.floor(Math.random() * 3) + 1;
    document.getElementById('frame-count').textContent = String(frame).padStart(6,'0');
  }, 42);

  // Subject ID
  function genID() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id = '';
    for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id.slice(0,4) + '-' + id.slice(4);
  }
  document.getElementById('subject-id').textContent = genID();

  // Start with first question
  nextQuestion();
</script>
</body>
</html>
